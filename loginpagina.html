<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login-title">Inloggen – Mees</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="i18n.js" defer></script>
</head>
<body>
    <div class="navbar">
        <div class="logo">Mees</div>
        <ul class="nav-links">
            <button onclick="window.location.href='index.html'" data-i18n="nav-start">Start</button>
            <div class="dropdown">
                <button class="dropbtn" onclick="window.location.href='menupagina.html'" data-i18n="nav-menu">Menu</button>
                <div class="content">
                    <a href="menupagina.html" data-i18n="nav-sandwiches">Broodjes</a>
                    <a href="menupagina.html" data-i18n="nav-drinks">Drinken</a>
                    <a href="menupagina.html" data-i18n="nav-snacks">Snacks</a>
                    <a href="menupagina.html" data-i18n="nav-pastries">Gebakjes</a>
                </div>
            </div>
            <button class="start-pagina" onclick="window.location.href='loginpagina.html'" data-i18n="nav-login">Inloggen</button>
        </ul>
        <ul class="icons">
            <span onclick="window.location.href='karretje.html'" class="material-symbols-outlined">shopping_cart</span>
            <button id="lang-toggle" onclick="toggleLanguage()" class="lang-toggle">EN</button>
        </ul>
    </div>

    <div class="logindiv">
        <h1 class="logintxt" data-i18n="login-header">Login</h1>
        <input class="emailbox" type="email" placeholder="JohnDoe@example.com" data-i18n="placeholder-email">
        <input class="passbox" type="password" placeholder="Wachtwoord-123" data-i18n="placeholder-password">
        <button class="regknop" data-i18n="btn-register">Registreren</button>
        <button onclick="window.location='index.html'" class="loginknop" data-i18n="btn-login">Login</button>
    </div>
</body>
</html>
