<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="order-title">Bestelling Afronden – Mees</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="i18n.js" defer></script>
</head>
<body>
    <div class="navbar">
        <div class="logo">Mees</div>
        <ul class="nav-links">
            <button onclick="window.location.href='index.html'" data-i18n="nav-start">Start</button>
            <div class="dropdown">
                <button class="dropbtn" onclick="window.location.href='menupagina.html'" data-i18n="nav-menu">Menu</button>
                <div class="content">
                    <a href="menupagina.html" data-i18n="nav-sandwiches">Broodjes</a>
                    <a href="menupagina.html" data-i18n="nav-drinks">Drinken</a>
                    <a href="menupagina.html" data-i18n="nav-snacks">Snacks</a>
                    <a href="menupagina.html" data-i18n="nav-pastries">Gebakjes</a>
                </div>
            </div>
            <button onclick="window.location.href='loginpagina.html'" data-i18n="nav-login">Inloggen</button>
        </ul>
        <ul class="icons">
            <span onclick="window.location.href='karretje.html'" class="material-symbols-outlined">shopping_cart</span>
            <button id="lang-toggle" onclick="toggleLanguage()" class="lang-toggle">EN</button>
        </ul>
    </div>

    <div class="ordercontainer">
        <h1 data-i18n="order-header">Bestelling afronden</h1>
        <p data-i18n="order-desc">Controleer uw bestelling voordat u betaalt.</p>

        <div class="order-item">
            <img src="placeholder.png" alt="Broodje Kaas">
            <div class="order-item-info">
                <h2 data-i18n="item-cheese-sandwich">Broodje Kaas</h2>
                <p data-i18n="desc-cheese-sandwich">Vers broodje met jonge kaas</p>
            </div>
            <div>
                <label data-i18n="label-quantity">Aantal:</label>
                <input class="aantal-input" type="number" value="1" min="1">
            </div>
            <p>€3,50</p>
        </div>

        <div class="order-item">
            <img src="placeholder.png" alt="Koffie">
            <div class="order-item-info">
                <h2 data-i18n="item-coffee">Koffie</h2>
                <p data-i18n="desc-coffee">Verse koffie</p>
            </div>
            <div>
                <label data-i18n="label-quantity">Aantal:</label>
                <input class="aantal-input" type="number" value="2" min="1">
            </div>
            <p>€4,00</p>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <h2 style="color: #f4a261;"><span data-i18n="label-total">Totaal:</span> €7,50</h2>
        </div>

        <div class="button-group" style="margin-top: 30px;">
            <button class="btn btn-secondary" onclick="window.location.href='karretje.html'" data-i18n="btn-back-cart">← Terug naar winkelmand</button>
            <button class="btn btn-primary" onclick="alert(window.getTranslation('thanks-order'))" data-i18n="btn-pay">Betalen</button>
        </div>
    </div>
</body>
</html>
